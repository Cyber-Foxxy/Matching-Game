<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <style>
        body { font-family: "Comic Sans MS", cursive; background: #fff1c1; text-align: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; border: 4px solid #ff6f91; display: inline-block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏆 Finished! 🏆</h1>
        <p id="resName"></p>
        <p id="resAge"></p>
        <h2 id="resAttempts"></h2>
        <button onclick="window.location.href='index.html'">Play Again</button>
        <button onclick="localStorage.clear(); window.location.href='index.html'">Reset All</button>
    </div>

    <script>
        const data = JSON.parse(localStorage.getItem('playerData'));
        if (data) {
            document.getElementById('resName').textContent = "Player: " + data.firstName + " " + data.lastName;
            document.getElementById('resAge').textContent = "Age: " + data.age;
            document.getElementById('resAttempts').textContent = "Total Attempts: " + data.attempts;
        }
    </script>
</body>
</html>
