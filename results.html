<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Memory Match - Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="results-card">
    <h1>🏆 Congratulations! 🏆</h1>
    <div class="data-point">Player: <span id="resName"></span></div>
    <div class="data-point">Age: <span id="resAge"></span></div>
    <hr>
    <div class="data-point">Total Attempts:</div>
    <div class="score" id="resAttempts"></div>

    <div class="btn-group">
      <button class="play-again" onclick="window.location.href='game.html'">Play Again</button>
      <button class="reset" onclick="resetGame()">Reset & New Player</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const playerData = JSON.parse(localStorage.getItem("playerData"));
      if (!playerData) window.location.href = "index.html";

      document.getElementById("resName").textContent = `${playerData.firstName} ${playerData.lastName}`;
      document.getElementById("resAge").textContent = playerData.age;
      document.getElementById("resAttempts").textContent = playerData.attempts;
    });

    function resetGame() {
      localStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
