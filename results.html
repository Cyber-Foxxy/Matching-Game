<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Memory Match - Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>🏆 You Did It! 🏆</h1>
  <p id="playerInfo"></p>
  <p>Total Attempts</p>
  <div class="score" id="finalScore"></div>

  <button onclick="playAgain()">Play Again</button>
  <button onclick="resetGame()">New Player</button>
</div>

<script>
const player = JSON.parse(localStorage.getItem("playerData"));
if (!player) window.location.href = "index.html";

playerInfo.textContent = `${player.firstName} ${player.lastName} (Age ${player.age})`;
finalScore.textContent = player.attempts;

function playAgain() {
  player.attempts = 0;
  localStorage.setItem("playerData", JSON.stringify(player));
  window.location.href = "game.html";
}

function resetGame() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

</body>
</html>
