<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animal Match - Play</title>
    <style>
        body { font-family: "Comic Sans MS", cursive; background: #fff1c1; text-align: center; }
        #gameBoard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, 120px); 
            gap: 15px; 
            justify-content: center; 
            max-width: 600px; 
            margin: 20px auto; 
        }
        img { width: 120px; height: 120px; border-radius: 12px; border: 4px solid #ffb703; cursor: pointer; background: #ffd166; }
        .stats { font-size: 1.2em; color: #ff6f91; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🐾 Animal Match 🐾</h1>
    <div class="stats">
        Player: <span id="playerName"></span> | Attempts: <span id="attempts">0</span>
    </div>
    <div id="gameBoard"></div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const board = document.getElementById("gameBoard");
        const attemptsText = document.getElementById("attempts");
        const nameText = document.getElementById("playerName");

        // 1. Load Player Data
        const playerData = JSON.parse(localStorage.getItem("playerData"));
        if (!playerData) return window.location.href = "index.html";
        nameText.textContent = playerData.firstName;

        // 2. Animal Data 
        const animals = [
images/crow.jpg
images/deer.jpg
images/duck.jpg
images/fox.jpg
images/goat.jpg
images/mouse.jpg
images/puppy.jpg
images/rabbit.jpg
images/raccoon.jpg
        const backImg = "https://placehold.co/120/ffd166/333333?text=🐾";

        let flippedCards = [];
        let attempts = 0;
        let matchedPairs = 0;

        // 3. Build & Shuffle Deck
        const deck = [...animals, ...animals].sort(() => Math.random() - 0.5);

        deck.forEach(animal => {
            const card = document.createElement("img");
            card.src = backImg;
            card.dataset.animal = animal;
            card.addEventListener("click", () => flipCard(card));
            board.appendChild(card);
        });

        function flipCard(card) {
            if (flippedCards.length === 2 || card.src !== backImg) return;

            card.src = card.dataset.animal;
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                attempts++;
                attemptsText.textContent = attempts;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.animal === c2.dataset.animal) {
                matchedPairs++;
                if (matchedPairs === animals.length) endGame();
            } else {
               // WRONG MATCH - These are the lines that make them "disappear":
      card1.src = backImg; 
      card2.src = backImg;
      
      // Also reset the flip state so they can be clicked again
      card1.dataset.flipped = "false";
      card2.dataset.flipped = "false";
    }

    flippedCards = []; // Clear the array for the next turn
  }

        function endGame() {
            playerData.attempts = attempts;
            localStorage.setItem("playerData", JSON.stringify(playerData));
            window.location.href = "results.html";
        }
    });
    </script>
</body>
</html>
