<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setup - Animal Match</title>
    <style>
        body { font-family: "Comic Sans MS", cursive; background: #fff1c1; text-align: center; padding: 50px; }
        .setup-card { background: white; padding: 30px; border-radius: 20px; display: inline-block; border: 4px solid #ff6f91; }
        input { display: block; margin: 10px auto; padding: 10px; border-radius: 8px; border: 2px solid #ffb703; }
        button { background: #ff6f91; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #ffb703; }
    </style>
</head>
<body>
    <h1>🐾 Welcome to Animal Match! 🐾</h1>
    <div class="setup-card">
        <input type="text" id="fname" placeholder="First Name">
        <input type="text" id="lname" placeholder="Last Name">
        <input type="number" id="age" placeholder="Age">
        <button onclick="startGame()">Start Game</button>
    </div>

    <script>
        function startGame() {
            const firstName = document.getElementById('fname').value;
            const lastName = document.getElementById('lname').value;
            const age = document.getElementById('age').value;

            if (!firstName || !lastName || !age) {
                alert("Please fill in all fields!");
                return;
            }

            const player = {
                firstName: firstName,
                lastName: lastName,
                age: age,
                attempts: 0
            };

            localStorage.setItem('playerData', JSON.stringify(player));
            window.location.href = 'game.html';
        }
    </script>
</body>
</html>
